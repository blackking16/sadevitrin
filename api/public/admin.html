<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SadeVitrin Y&ouml;netim</title>
    <style>
      :root { --ink:#14211b; --muted:#6f766f; --line:#d9ddd6; --paper:#f6f5f1; --panel:#fff; --brand:#207a56; --dark:#102017; --warn:#8a5a12; --danger:#9b2525; }
      *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink)}
      main{width:min(1240px,calc(100% - 32px));margin:0 auto;padding:32px 0 56px} header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
      h1,h2,h3,p{margin:0} h1{font-size:30px;line-height:1.1} h2{font-size:18px;margin-bottom:12px} h3{font-size:15px;margin-bottom:5px}.muted{color:var(--muted)}
      .login,.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}.login{max-width:420px;margin:12vh auto}.stack{display:grid;gap:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:8px;padding:13px;background:#fff}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
      input,select{width:100%;height:44px;border:1px solid var(--line);border-radius:8px;padding:0 12px;background:#fbfaf7;color:var(--ink)}button{border:0;border-radius:8px;min-height:38px;padding:0 13px;font-weight:800;cursor:pointer;background:var(--dark);color:#fff}button.secondary{background:#eef2ed;color:var(--ink);border:1px solid var(--line)}button.green{background:var(--brand)}button.danger{background:var(--danger)}button:disabled{opacity:.45;cursor:not-allowed}.hidden{display:none!important}.error{color:var(--danger);min-height:20px}.badge{display:inline-flex;align-items:center;min-height:25px;padding:0 9px;border-radius:999px;border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:800}.badge.open{color:var(--brand);border-color:#9fd2bc;background:#eef8f3}.badge.wait{color:var(--warn);border-color:#efd08f;background:#fff7e5}.badge.danger{color:var(--danger);border-color:#e0a0a0;background:#fff1f1}table{width:100%;border-collapse:collapse}td{border-top:1px solid var(--line);padding:9px 0;vertical-align:top;font-size:14px}.section{display:none}.section.active{display:grid;gap:12px}
      @media(max-width:900px){header{align-items:flex-start;flex-direction:column}.grid,.two{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main>
      <section id="login" class="login stack"><div><h1>SadeVitrin</h1><p class="muted">Y&ouml;netici paneli</p></div><input id="identifier" value="admin@sadevitrin.local" placeholder="E-posta veya telefon"/><input id="password" value="Demo1234!" placeholder="&#350;ifre" type="password"/><button id="loginButton">Giri&#351; yap</button><p id="loginError" class="error"></p></section>
      <section id="panel" class="hidden"><header><div><h1>Y&ouml;netim</h1><p class="muted">Sat&#305;c&#305;, talep, ihale, &uuml;r&uuml;n, sipari&#351;, vitrin ve &#351;ikayet operasyonu.</p></div><button id="refreshButton" class="secondary">Yenile</button></header><div class="grid"><div class="card"><p class="muted">Bekleyen talep</p><h2 id="requestCount">0</h2></div><div class="card"><p class="muted">A&ccedil;&#305;k ihale</p><h2 id="auctionCount">0</h2></div><div class="card"><p class="muted">Aktif sat&#305;c&#305;</p><h2 id="sellerCount">0</h2></div><div class="card"><p class="muted">Kullan&#305;c&#305; talebi</p><h2 id="demandCount">0</h2></div><div class="card"><p class="muted">Barkod talebi</p><h2 id="barcodeDemandCount">0</h2></div><div class="card"><p class="muted">Vitrin</p><h2 id="influencerCount">0</h2></div><div class="card"><p class="muted">A&ccedil;&#305;k &#351;ikayet</p><h2 id="complaintCount">0</h2></div></div><nav class="tabs" id="tabs"></nav><div id="sections"></div></section>
    </main>
    <script>
      const api=location.origin; let token=localStorage.getItem('sadevitrin-admin-token')||''; let activeSection='sellers'; let state={requests:[],auctions:[],products:[],sellers:[],orders:[],complaints:[],searchDemands:[],barcodeDemands:[],influencers:[]};
      const $=(id)=>document.getElementById(id); const money=(v)=>`${Number(v||0).toLocaleString('tr-TR')} TL`; const esc=(v)=>String(v??'').replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      async function request(path,options={}){const r=await fetch(`${api}${path}`,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{ }),...(options.headers||{})}}); if(!r.ok){const e=await r.json().catch(()=>({message:'\u0130\u015Flem tamamlanamad\u0131.'})); throw new Error(e.message||'\u0130\u015Flem tamamlanamad\u0131.')} if(r.status===204)return null; return r.json()}
      const bidScore=(b)=>Number(b.price)+Number(b.deliveryDays)*10-Number(b.stock)*0.05; const reqBadge=(x)=>!x.auction?'<span class="badge wait">Onay bekliyor</span>':x.auction.status==='OPEN'?'<span class="badge open">&#304;halede</span>':'<span class="badge">Sonu&ccedil;land&#305;</span>';
      function tabButton(key,label){return `<button class="secondary" onclick="show('${key}')">${label}</button>`}
      function show(key){activeSection=key;document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));$(key)?.classList.add('active')}
      async function loadData(){[state.requests,state.auctions,state.products,state.sellers,state.orders,state.complaints,state.searchDemands,state.barcodeDemands,state.influencers]=await Promise.all([request('/admin/product-requests'),request('/admin/auctions'),request('/admin/products'),request('/admin/sellers'),request('/admin/orders'),request('/admin/complaints'),request('/admin/search-demands'),request('/admin/barcode-demands'),request('/admin/influencers')]); render(); show(activeSection)}
      function render(){ $('requestCount').textContent=state.requests.filter(x=>!x.auction).length; $('auctionCount').textContent=state.auctions.filter(x=>x.status==='OPEN').length; $('sellerCount').textContent=state.sellers.filter(x=>x.sellerProfile?.status==='APPROVED').length; $('demandCount').textContent=state.searchDemands.filter(x=>x.status==='OPEN').length; $('barcodeDemandCount').textContent=state.barcodeDemands.filter(x=>x.status==='OPEN').length; $('influencerCount').textContent=state.influencers.length; $('complaintCount').textContent=state.complaints.filter(x=>x.status!=='RESOLVED').length; $('tabs').innerHTML=[tabButton('sellers','Sat&#305;c&#305;lar'),tabButton('requests','Talepler'),tabButton('demands','Kullan&#305;c&#305; talepleri'),tabButton('barcodeDemands','Barkod talepleri'),tabButton('auctions','&#304;haleler'),tabButton('products','&Uuml;r&uuml;nler'),tabButton('orders','Sipari&#351;ler'),tabButton('influencers','Vitrinler'),tabButton('complaints','&#350;ikayetler')].join(''); $('sections').innerHTML=`<section id="sellers" class="section active card"><h2>Sat&#305;c&#305;lar</h2><div class="list">${renderSellers()}</div></section><section id="requests" class="section card"><h2>&Uuml;r&uuml;n talepleri</h2><div class="list">${renderRequests()}</div></section><section id="demands" class="section card"><h2>Kullan&#305;c&#305; arama talepleri</h2><div class="list">${renderSearchDemands()}</div></section><section id="barcodeDemands" class="section card"><h2>Barkod talepleri</h2><div class="list">${renderBarcodeDemands()}</div></section><section id="auctions" class="section card"><h2>&#304;haleler</h2><div class="list">${renderAuctions()}</div></section><section id="products" class="section card"><h2>&Uuml;r&uuml;nler</h2><div class="list">${renderProducts()}</div></section><section id="orders" class="section card"><h2>Sipari&#351;ler</h2><div class="list">${renderOrders()}</div></section><section id="influencers" class="section card"><h2>Vitrinler</h2><div class="list">${renderInfluencers()}</div></section><section id="complaints" class="section card"><h2>&#350;ikayetler</h2><div class="list">${renderComplaints()}</div></section>` }
      function renderSellers(){return state.sellers.length?state.sellers.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.sellerProfile?.companyName||x.name)}</h3><span class="badge ${x.sellerProfile?.status==='APPROVED'?'open':x.sellerProfile?.status==='SUSPENDED'?'danger':'wait'}">${x.sellerProfile?.status}</span></div><p class="muted">${esc(x.email)} · ${esc(x.phone)} · Vergi: ${esc(x.sellerProfile?.taxNumber)}</p><p class="muted">${x.productRequests.length} talep · ${x.bids.length} teklif · ${x.products.length} &uuml;r&uuml;n</p><div class="row"><button class="green" onclick="sellerStatus('${x.id}','APPROVED')">Onayla</button><button class="secondary" onclick="sellerStatus('${x.id}','PENDING')">&#304;ncelemede</button><button class="danger" onclick="sellerStatus('${x.id}','SUSPENDED')">Askıya al</button></div></article>`).join(''):'<p class="muted">Sat&#305;c&#305; yok.</p>'}
      function renderRequests(){return state.requests.length?state.requests.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.brand)} ${esc(x.model)} ${esc(x.packageInfo)}</h3>${reqBadge(x)}</div><p class="muted">${esc(x.categoryName||x.category)} ${x.subCategoryName?'· '+esc(x.subCategoryName):''} ${x.segmentName?'· '+esc(x.segmentName):''} · ${esc(x.description)}</p><p class="muted">Talep eden: ${esc(x.seller?.sellerProfile?.companyName||x.seller?.name)}</p><button class="green" ${x.auction?'disabled':''} onclick="openAuction('${x.id}')">&#304;haleye a&ccedil;</button></article>`).join(''):'<p class="muted">Talep yok.</p>'}
      function renderAuctions(){return state.auctions.length?state.auctions.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.request.brand)} ${esc(x.request.model)}</h3><span class="badge ${x.status==='OPEN'?'open':''}">${x.status}</span></div><p class="muted">Biti&#351;: ${new Date(x.endsAt).toLocaleString('tr-TR')} · ${x.bids.length} teklif</p><table>${[...x.bids].sort((a,b)=>bidScore(a)-bidScore(b)).map(b=>`<tr><td>${esc(b.seller?.sellerProfile?.companyName||b.seller?.name)}</td><td>${money(b.price)}</td><td>${b.stock} stok</td><td>${b.deliveryDays} g&uuml;n</td><td>Skor ${bidScore(b).toFixed(2)}</td></tr>`).join('')||'<tr><td class="muted">Teklif yok.</td></tr>'}</table><button ${x.status!=='OPEN'||!x.bids.length?'disabled':''} onclick="completeAuction('${x.id}')">En iyi teklifle sonu&ccedil;land&#305;r</button></article>`).join(''):'<p class="muted">&#304;hale yok.</p>'}
      function renderProducts(){return state.products.length?state.products.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.title)}</h3><span class="badge ${x.isActive?'open':'danger'}">${x.isActive?'Yay&#305;nda':'Kapal&#305;'}</span></div><p class="muted">${esc(x.categoryName||x.category)} ${x.subCategoryName?'· '+esc(x.subCategoryName):''} ${x.segmentName?'· '+esc(x.segmentName):''}</p><p class="muted">${esc(x.seller?.sellerProfile?.companyName||x.seller?.name)} · ${money(x.price)} · ${x.stock} stok · ${x.deliveryDays} g&uuml;n</p><div class="row"><button class="secondary" onclick="productActive('${x.id}',${!x.isActive})">${x.isActive?'&Uuml;r&uuml;n&uuml; kapat':'Yay&#305;na al'}</button></div></article>`).join(''):'<p class="muted">&Uuml;r&uuml;n yok.</p>'}
      function renderOrders(){return state.orders.length?state.orders.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.orderNumber)}</h3><span class="badge ${x.status==='DELIVERED'?'open':'wait'}">${x.status}</span></div><p class="muted">M&uuml;&#351;teri: ${esc(x.user?.name)} · ${esc(x.user?.phone)} · ${money(x.total)} · &Ouml;deme ${x.paymentStatus}</p><p class="muted">Adres: ${esc(x.address?.city)} / ${esc(x.address?.district)} · ${esc(x.address?.detail)}</p><table>${x.items.map(i=>`<tr><td>${esc(i.title)}</td><td>${i.quantity} adet</td><td>${esc(i.product?.seller?.sellerProfile?.companyName||i.product?.seller?.name)}</td><td>${money(i.total)}</td></tr>`).join('')}</table></article>`).join(''):'<p class="muted">Sipari&#351; yok.</p>'}
      function renderSearchDemands(){return state.searchDemands.length?state.searchDemands.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.query)}</h3><span class="badge ${x.status==='OPEN'?'wait':x.status==='AUCTION_PLANNED'?'open':''}">${x.status}</span></div><p class="muted">Sonu&ccedil;: ${x.resultCount} · ${esc(x.categoryName||x.category||'-')} ${x.subCategoryName?'· '+esc(x.subCategoryName):''} ${x.segmentName?'· '+esc(x.segmentName):''}</p><p class="muted">Kullan&#305;c&#305;: ${esc(x.user?.name||'Anonim')} · ${esc(x.user?.phone||'')}</p><div class="row"><button class="secondary" onclick="demandStatus('${x.id}','REVIEWED')">&#304;ncelendi</button><button class="green" onclick="demandStatus('${x.id}','AUCTION_PLANNED')">&Uuml;r&uuml;n talebi ve ihale a&ccedil;</button><button class="secondary" onclick="demandStatus('${x.id}','CLOSED')">Kapat</button></div></article>`).join(''):'<p class="muted">Aran&#305;p bulunamayan &uuml;r&uuml;n talebi yok.</p>'}
      function renderInfluencers(){return state.influencers.length?state.influencers.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.name)}</h3><span class="badge ${x.status==='PUBLISHED'?'open':'wait'}">${esc(x.status)}</span></div><p class="muted">${esc(x.handle)} · ${esc(x.specialty)} · ${x.follows?.length||0} takip · ${x.posts?.length||0} post · ${x.products?.length||0} vitrin ürünü · ${x.collections?.length||0} koleksiyon</p><p>${esc(x.bio)}</p></article>`).join(''):'<p class="muted">Vitrin yok.</p>'}
      function renderBarcodeDemands(){return state.barcodeDemands.length?state.barcodeDemands.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.barcode)}</h3><span class="badge ${x.status==='OPEN'?'wait':x.status==='LINKED'?'open':''}">${x.status}</span></div><p>${esc(x.note||'Kullan&#305;c&#305; a&ccedil;&#305;klama girmedi.')}</p><p class="muted">Kullan&#305;c&#305;: ${esc(x.user?.name||'Anonim')} · ${esc(x.user?.phone||'')}</p><div class="row"><button class="green" onclick="barcodeDemandStatus('${x.id}','LINKED')">&Uuml;r&uuml;n haf&#305;zas&#305;na ba&#287;land&#305;</button><button class="secondary" onclick="barcodeDemandStatus('${x.id}','REVIEWED')">&#304;ncelendi</button><button class="secondary" onclick="barcodeDemandStatus('${x.id}','CLOSED')">Kapat</button></div></article>`).join(''):'<p class="muted">Barkod talebi yok.</p>'}
      function renderComplaints(){return state.complaints.length?state.complaints.map(x=>`<article class="item stack"><div class="row"><h3>${esc(x.subject)}</h3><span class="badge ${x.status==='RESOLVED'?'open':'wait'}">${x.status}</span></div><p>${esc(x.message)}</p><p class="muted">${esc(x.user?.name)} · ${esc(x.user?.email)} · ${x.user?.role}</p><div class="row"><button class="secondary" onclick="complaintStatus('${x.id}','IN_REVIEW')">&#304;ncele</button><button class="green" onclick="complaintStatus('${x.id}','RESOLVED')">&Ccedil;&ouml;z&uuml;ld&uuml;</button><button class="danger" onclick="complaintStatus('${x.id}','REJECTED')">Reddet</button></div></article>`).join(''):'<p class="muted">&#350;ikayet yok.</p>'}
      async function sellerStatus(id,status){await request(`/admin/sellers/${id}/status`,{method:'PATCH',body:JSON.stringify({status})});await loadData()} async function openAuction(id){await request(`/admin/product-requests/${id}/auction`,{method:'POST',body:JSON.stringify({durationDays:7})});await loadData()} async function completeAuction(id){await request(`/admin/auctions/${id}/complete`,{method:'POST',body:JSON.stringify({})});await loadData()} async function productActive(id,isActive){await request(`/admin/products/${id}`,{method:'PATCH',body:JSON.stringify({isActive})});await loadData()} async function complaintStatus(id,status){await request(`/admin/complaints/${id}/status`,{method:'PATCH',body:JSON.stringify({status})});await loadData()} async function demandStatus(id,status){if(status==='AUCTION_PLANNED'){await request(`/admin/search-demands/${id}/auction`,{method:'POST',body:JSON.stringify({durationDays:7})})}else{await request(`/admin/search-demands/${id}/status`,{method:'PATCH',body:JSON.stringify({status})})}await loadData()} async function barcodeDemandStatus(id,status){await request(`/admin/barcode-demands/${id}/status`,{method:'PATCH',body:JSON.stringify({status})});await loadData()}
      async function login(){ $('loginError').textContent=''; try{const r=await request('/auth/login',{method:'POST',body:JSON.stringify({identifier:$('identifier').value,password:$('password').value})}); if(r.user.role!=='ADMIN')throw new Error('Bu panel i\u00E7in y\u00F6netici hesab\u0131 gerekli.'); token=r.token; localStorage.setItem('sadevitrin-admin-token',token); $('login').classList.add('hidden');$('panel').classList.remove('hidden'); await loadData()}catch(e){$('loginError').textContent=e.message}}
      $('loginButton').addEventListener('click',login); $('refreshButton').addEventListener('click',loadData); if(token){$('login').classList.add('hidden');$('panel').classList.remove('hidden');loadData().catch(()=>{localStorage.removeItem('sadevitrin-admin-token');location.reload()})}
    </script>
  </body>
</html>
